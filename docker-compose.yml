version: '3.9'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: tasker
      POSTGRES_PASSWORD: tasker
      POSTGRES_DB: tasker
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tasker
      SPRING_DATASOURCE_USERNAME: tasker
      SPRING_DATASOURCE_PASSWORD: tasker
      JWT_SECRET: changemechangemechangemechangeme
    depends_on:
      - postgres
    ports:
      - "8080:8080"
volumes:
  postgres-data:
