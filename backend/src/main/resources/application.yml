spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/tasker
    username: tasker
    password: tasker
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: always
jwt:
  secret: changemechangemechangemechangeme
  issuer: tasker
  access-token-ttl: 900
  refresh-token-ttl: 1209600

logging:
  level:
    root: INFO
    org.springframework.security: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
